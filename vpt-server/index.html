<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Vantage Point Tracking</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#C9A84C;--gold-dark:#8B6914;--black:#1A1A1A;--surface:#242424;
  --surface2:#2E2E2E;--steel:#6B7280;--cream:#F5F0E8;
  --red:#C0392B;--amber:#E67E22;--green:#27AE60;
  --border:#333333;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--black);color:var(--cream);min-height:100vh}
.screen{display:none;padding:1rem;max-width:720px;margin:0 auto;padding-bottom:80px}
.screen.active{display:block}

/* TOPBAR */
.topbar-main{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1rem;height:56px;display:none;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.brand{font-weight:700;letter-spacing:1px;color:var(--gold);display:flex;align-items:center;gap:0.5rem}

/* GLOBAL NAV */
.nav-grid{display:grid;grid-template-columns:repeat(5,1fr);background:var(--surface);border-top:1px solid var(--border);position:fixed;bottom:0;left:0;right:0;height:64px;display:none;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.nav-item{display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--steel);text-decoration:none;font-size:10px;gap:2px;cursor:pointer}
.nav-item.active{color:var(--gold)}
.nav-item i{font-size:20px}

/* DYNAMIC STATUS BOARD (MATCHING THE SCREENSHOT GRID) */
.vessel-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1rem;margin-top:0.5rem}
.vessel-card-trip{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.25rem;text-align:center;position:relative;cursor:pointer}
.vessel-icon{width:48px;height:48px;border-radius:50%;background:var(--surface2);color:var(--gold);display:flex;align-items:center;justify-content:center;margin:0 auto 0.75rem auto;font-size:20px;border:1px solid var(--border)}
.vname{font-size:16px;font-weight:700;color:var(--cream);margin-bottom:2px}
.pct-bar-bg{background:var(--surface2);height:6px;border-radius:3px;width:100%;margin:0.75rem 0;overflow:hidden}
.pct-bar-fill{background:var(--gold);height:100%;border-radius:3px;width:100%}

/* METRIC ROW BANNER */
.dash-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0.75rem;margin-bottom:1.25rem}
.metric-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:0.75rem;text-align:center}
.metric-val{font-size:20px;font-weight:700;color:var(--cream);margin-bottom:2px}
.metric-label{font-size:10px;color:var(--steel);text-transform:uppercase;letter-spacing:0.5px}

/* FORM ELEMENTS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:1rem;margin-bottom:1rem}
.row{display:flex;flex-wrap:wrap;margin:0 -0.5rem}
.col-md-6{width:50%;padding:0 0.5rem}
.col-md-3{width:25%;padding:0 0.5rem}
.col-6{width:50%;padding:0 0.5rem}
.col-12{width:100%;padding:0 0.5rem}
.g-2{margin:0 -0.25rem}.g-2 > [class*="col-"]{padding:0 0.25rem;margin-bottom:0.5rem}

.btn{background:var(--surface2);color:var(--cream);border:1px solid var(--border);padding:0.75rem 1rem;border-radius:6px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:0.5rem;width:100%}
.btn-gold{background:var(--gold);color:var(--black);border:none;font-weight:600}
.btn:disabled{opacity:0.5;cursor:not-allowed}

.form-group{margin-bottom:1rem}
.form-group label{display:block;margin-bottom:0.25rem;font-size:12px;color:var(--steel);text-transform:uppercase;letter-spacing:0.5px}
.form-control{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--cream);padding:0.75rem;border-radius:6px;font-size:14px}
.form-control:focus{outline:none;border-color:var(--gold)}

.stat-pill{display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:600}
.pill-ok{background:rgba(39,174,96,0.15);color:var(--green)}
.pill-warn{background:rgba(230,126,34,0.15);color:var(--amber)}
.pill-danger{background:rgba(192,57,43,0.15);color:var(--red)}

.tab-scroll{display:flex;overflow-x:auto;gap:0.5rem;padding-bottom:0.5rem;margin-bottom:1rem;scrollbar-width:none}
.tab-scroll::-webkit-scrollbar{display:none}
.tab-btn{background:var(--surface);border:1px solid var(--border);color:var(--steel);padding:0.5rem 1rem;border-radius:20px;font-size:13px;white-space:nowrap;cursor:pointer}
.tab-btn.active{background:rgba(201,168,76,0.1);color:var(--gold);border-color:var(--gold)}
.tab-pane{display:none}
.tab-pane.active{display:block}

.list-item{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:1rem;margin-bottom:0.75rem;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.log-row{background:var(--surface);border-left:4px solid var(--steel);padding:0.75rem;margin-bottom:0.5rem;border-radius:0 6px 6px 0}
.check-actions{display:flex;gap:0.5rem}
.action-btn{background:var(--surface2);border:1px solid var(--border);color:var(--cream);width:36px;height:36px;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.action-btn.active-ok{background:var(--green);color:white;border-color:var(--green)}
.action-btn.active-flag{background:var(--red);color:white;border-color:var(--red)}
.badge-tray{display:flex;flex-wrap:wrap;gap:0.25rem;margin-top:0.5rem}
.empty-state{text-align:center;padding:2rem 1rem;color:var(--steel);font-size:14px;background:var(--surface2);border-radius:8px;border:1px dashed var(--border)}
</style>
</head>
<body>

<div class="topbar-main" id="topbar">
  <div class="brand"><i class="ti ti-anchor"></i> Vantage Point Tracking</div>
  <div id="user-chip" style="font-size:12px;color:var(--steel);background:var(--surface2);padding:4px 8px;border-radius:4px;border:1px solid var(--border)"></div>
</div>

<div class="screen active" id="s-login">
  <div style="text-align:center;margin:4rem 0 2rem 0">
    <i class="ti ti-anchor" style="font-size:48px;color:var(--gold)"></i>
    <h2 style="margin-top:0.5rem">Vantage Point Tracking</h2>
    <p style="color:var(--steel);font-size:14px">Marine Fleet Intelligence Infrastructure</p>
  </div>
  <div class="card">
    <div class="form-group">
      <label>Email Connection String</label>
      <input type="email" id="login-email" class="form-control" value="test_crew@vantagepoint.com">
    </div>
    <div class="form-group">
      <label>Password Signature</label>
      <input type="password" id="login-pass" class="form-control" value="password123">
    </div>
    <button class="btn btn-gold" id="btn-login" onclick="login()">Authenticate Session</button>
  </div>
</div>

<div class="screen" id="s-dash">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
    <h3 id="dash-greeting">Fleet Dashboard</h3>
  </div>

  <div class="tab-scroll" id="dash-tabs">
    <button class="tab-btn active" onclick="switchDashTab('overview')">Status Board</button>
    <button class="tab-btn mgr-only" onclick="switchDashTab('maintenance')">Maintenance</button>
    <button class="tab-btn mgr-only" onclick="switchDashTab('safety')">Compliance & Safety</button>
  </div>

  <div class="tab-pane active" id="tab-overview">
    <div class="dash-grid mgr-only">
      <div class="metric-card"><div class="metric-val" id="met-vessels">-</div><div class="metric-label">Assigned Hull</div></div>
      <div class="metric-card"><div class="metric-val" id="met-logs" style="color:var(--gold)">-</div><div class="metric-label">Active Trips</div></div>
      <div class="metric-card"><div class="metric-val" id="met-flags" style="color:var(--amber)">-</div><div class="metric-label">System Flags</div></div>
      <div class="metric-card"><div class="metric-val" id="met-wo" style="color:var(--red)">-</div><div class="metric-label">Pending WO</div></div>
    </div>
    <h4 style="margin-bottom:0.75rem">Operational Fleet Manifest</h4>
    <div id="fleet-list" class="vessel-grid"></div>
  </div>

  <div class="tab-pane" id="tab-maintenance">
    <div style="display:flex;justify-content:space-between;margin-bottom:1rem">
      <h4>Open Urgent Work Orders</h4>
    </div>
    <div id="wo-list"><div class="empty-state">No open maintenance parameters.</div></div>
  </div>

  <div class="tab-pane" id="tab-safety">
    <h4>Regulatory Certificate Framework</h4>
    <div id="cert-list" class="empty-state" style="margin-top:
