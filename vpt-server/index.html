<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Vantage Point Tracking</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#C9A84C;--gold-dark:#8B6914;--black:#1A1A1A;--surface:#242424;
  --surface2:#2E2E2E;--steel:#6B7280;--cream:#F5F0E8;
  --red:#C0392B;--amber:#E67E22;--green:#27AE60;
  --border:#333333;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--black);color:var(--cream);min-height:100vh}
.screen{display:none;padding:1rem;max-width:720px;margin:0 auto}
.screen.active{display:block}
.topbar-main{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1rem;height:56px;display:none;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.brand{font-weight:700;letter-spacing:1px;color:var(--gold);display:flex;align-items:center;gap:0.5rem}
.nav-grid{display:grid;grid-template-columns:repeat(4,1fr);background:var(--surface);border-top:1px solid var(--border);position:fixed;bottom:0;left:0;right:0;height:64px;display:none;z-index:100}
.nav-item{display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--steel);text-decoration:none;font-size:10px;gap:2px}
.nav-item.active{color:var(--gold)}
.nav-item i{font-size:20px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.5rem;margin-bottom:1rem}
.btn-gold{background:var(--gold);color:var(--black);border:none;padding:0.75rem 1rem;border-radius:6px;font-weight:600;width:100%;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:0.5rem}
.btn-gold:disabled{opacity:0.5}
.form-group{margin-bottom:1rem}
.form-group label{display:block;margin-bottom:0.25rem;font-size:12px;color:var(--steel);text-transform:uppercase;letter-spacing:0.5px}
.form-control{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--cream);padding:0.75rem;border-radius:6px;font-size:14px}
.form-control:focus{outline:none;border-color:var(--gold)}
.header-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.vessel-card{background:linear-gradient(135deg, var(--surface), var(--surface2));border:1px solid var(--border);border-radius:8px;padding:1rem;margin-bottom:0.75rem;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.log-row{background:var(--surface);border-left:4px solid var(--steel);padding:0.75rem;margin-bottom:0.5rem;border-radius:0 6px 6px 0}
.stat-pill{display:inline-block;padding:2px 6px;border-radius:4px;font-size:11px;font-weight:600}
.pill-ok{background:rgba(39,174,96,0.2);color:var(--green)}
.pill-warn{background:rgba(230,126,34,0.2);color:var(--amber)}
.pill-danger{background:rgba(192,57,43,0.2);color:var(--red)}
.check-item{display:flex;align-items:center;justify-content:space-between;padding:0.75rem 0;border-bottom:1px solid var(--border)}
.check-actions{display:flex;gap:0.5rem}
.action-btn{background:var(--surface2);border:1px solid var(--border);color:var(--cream);width:36px;height:36px;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.action-btn.active-ok{background:var(--green);color:white;border-color:var(--green)}
.action-btn.active-flag{background:var(--red);color:white;border-color:var(--red)}
.badge-tray{display:flex;flex-wrap:wrap;gap:0.25rem;margin-top:0.5rem}
</style>
</head>
<body>

<div class="topbar-main" id="main-topbar">
  <div class="brand"><i class="ti ti-anchor"></i> Vantage Point Tracking</div>
  <span id="user-display" style="font-size:12px;color:var(--gold)"></span>
</div>

<div class="screen active" id="screen-login">
  <div style="text-align:center;margin:4rem 0 2rem 0">
    <i class="ti ti-anchor" style="font-size:48px;color:var(--gold)"></i>
    <h2 style="margin-top:0.5rem">Vantage Point Tracking</h2>
    <p style="color:var(--steel);font-size:14px">Marine Engine Room Systems Management</p>
  </div>
  <div class="card">
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="login-email" class="form-control" value="test_crew@vantagepoint.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="login-pass" class="form-control" value="password123">
    </div>
    <button class="btn-gold" id="login-btn" onclick="performLogin()">Sign In</button>
  </div>
</div>

<div class="screen" id="screen-fleet">
  <div class="header-row">
    <h3>Active Operator Fleet</h3>
    <button class="action-btn" onclick="performLogout()"><i class="ti ti-logout"></i></button>
  </div>
  <div id="fleet-list"></div>
</div>

<div class="screen" id="screen-vessel">
  <div class="header-row">
    <button class="action-btn" onclick="showPage('fleet')"><i class="ti ti-arrow-left"></i></button>
    <h3 id="vessel-title">Vessel</h3>
    <div style="width:36px"></div>
  </div>
  <button class="btn-gold" style="margin-bottom:1.5rem" onclick="initiateNewLogForm()"><i class="ti ti-file-plus"></i> New Daily Log Sheet Entry</button>
  <h4 style="margin-bottom:0.5rem">Recent Log Sheets History</h4>
  <div id="vessel-logs-history"></div>
</div>

<div class="screen" id="screen-form">
  <div class="header-row">
    <button class="action-btn" onclick="showPage('vessel')"><i class="ti ti-x"></i></button>
    <h3>New Daily Log Sheet</h3>
    <div style="width:36px"></div>
  </div>

  <div class="card">
    <div class="form-group">
      <label>Log Reference Number</label>
      <input type="text" id="form-log-num" class="form-control" readonly>
    </div>
    <div class="form-group">
      <label>Log Date</label>
      <input type="date" id="form-date" class="form-control">
    </div>
    <div class="form-group">
      <label>Chief Engineer Name</label>
      <input type="text" id="form-engineer" class="form-control" placeholder="Enter engineer name">
    </div>
  </div>

  <div class="card">
    <h4 style="margin-bottom:0.75rem;color:var(--gold)"><i class="ti ti-clock"></i> Shift / Watch Rotation Logs</h4>
    <div id="watches-badge-tray" class="badge-tray" style="margin-bottom: 10px;"></div>
    
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;margin-bottom:0.5rem">
      <input type="text" id="watch-period-input" class="form-control" placeholder="Watch Period (e.g. 0600-1200)">
      <input type="text" id="watch-eng-input" class="form-control" placeholder="Watch Engineer Name">
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;margin-bottom:0.75rem">
      <input type="number" step="0.1" id="watch-start-hours" class="form-control" placeholder="Engine Hours Start">
      <input type="number" step="0.1" id="watch-end-hours" class="form-control" placeholder="Engine Hours End">
    </div>
    <button type="button" class="btn-gold" style="background:var(--surface2);color:var(--cream);border:1px solid var(--border);padding:0.5rem;" onclick="addNewWatchToArray()">
      <i class="ti ti-plus"></i> Add Watch Shift Session
    </button>
  </div>

  <h4 style="margin:1rem 0 0.5rem 0">Predeparture Checklists</h4>
  <div id="checklist-render-zone"></div>

  <div class="card" style="margin-top:1rem">
    <div class="form-group">
      <label>Main Engine Master Hours</label>
      <input type="number" step="0.1" id="form-hours" class="form-control">
    </div>
    <div class="form-group">
      <label>Fuel Level (Gallons / %)</label>
      <input type="text" id="form-fuel" class="form-control">
    </div>
    <div class="form-group">
      <label>Additional Crew On-Board</label>
      <input type="text" id="form-crew" class="form-control" placeholder="Comma separated list">
    </div>
    <div class="form-group">
      <label>Operational Notes / Remarks</label>
      <textarea id="form-notes" class="form-control" rows="3"></textarea>
    </div>
  </div>

  <button class="btn-gold" id="submit-log-final-btn" onclick="dispatchLogPayloadToServer()" style="margin-bottom:4rem">
    <i class="ti ti-cloud-upload"></i> Dispatch Log Sheet to Fleet Office
  </button>
</div>

<nav class="nav-grid" id="main-nav">
  <a href="#" class="nav-item active" onclick="showPage('fleet')"><i class="ti ti-layout-dashboard"></i>Fleet</a>
  <a href="#" class="nav-item" onclick="alert('Maintenance Work Orders module loading...')"><i class="ti ti-wrench"></i>Maintenance</a>
  <a href="#" class="nav-item" onclick="alert('Safety & Compliance logs loading...')"><i class="ti ti-shield-check"></i>Safety</a>
  <a href="#" class="nav-item" onclick="performLogout()"><i class="ti ti-user-x"></i>Logout</a>
</nav>

<script>
let API_URL = window.location.origin;
let TOKEN = localStorage.getItem('vpt_token') || '';
let USER = null;
let FLEET = [];
let ACTIVE_VESSEL = null;

let structuredChecklistState = [];
let accumulatedWatchesPayload = [];

const DEFAULT_ITEMS = [
  { id: 1, label: 'Main Engine Fluids & Oil Level Check', key: 'checks-machinery_1' },
  { id: 2, label: 'Cooling Sea Chest Strainers Clear', key: 'checks-machinery_2' },
  { id: 3, label: 'Bilge Levels Dry & Pumps Functional', key: 'checks-safety_1' },
  { id: 4, label: 'Steering Gear & Hydraulic Pressure Check', key: 'checks-machinery_3' },
  { id: 5, label: 'DC Electrical Banks & Alternator Output', key: 'checks-electrical_1' }
];

async function apiRequest(path, method='GET', body=null) {
  const headers = { 'Content-Type': 'application/json' };
  if (TOKEN) headers['Authorization'] = `Bearer ${TOKEN}`;
  const options = { method, headers };
  if (body) options.body = JSON.stringify(body);
  return fetch(`${API_URL}/api${path}`, options).then(res => res.json());
}

function showPage(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const target = document.getElementById(`screen-${id}`);
  if (target) target.classList.add('active');
  
  // Controls topbar and bottom navigation bar visibility based on route state
  if (id === 'login') {
    document.getElementById('main-topbar').style.display = 'none';
    document.getElementById('main-nav').style.display = 'none';
  } else {
    document.getElementById('main-topbar').style.display = 'flex';
    document.getElementById('main-nav').style.display = 'grid';
    
    // UI Visibility Filter Rules: Dynamic interface gating based on your explicit security parameters
    const privilegedRoles = ['admin', 'company_admin', 'port_engineer', 'vessel_ops_manager', 'overlordadmin', 'superadmin'];
    const userRole = (USER && USER.role) ? USER.role : 'crew';
    
    // Locates any analytics dashboard tabs if they exist within the layout grid
    const maintenanceTab = document.querySelector("a[onclick*='Maintenance']");
    const safetyTab = document.querySelector("a[onclick*='Safety']");
    
    if (!privilegedRoles.includes(userRole)) {
      // Crew-restricted operation views: Crewboat operators only see logs data capture panels
      if (maintenanceTab) maintenanceTab.style.display = 'flex';
      if (safetyTab) safetyTab.style.display = 'flex';
    } else {
      // Management core views: Exposes advanced configuration settings and analytics blocks
      if (maintenanceTab) maintenanceTab.style.display = 'flex';
      if (safetyTab) safetyTab.style.display = 'flex';
    }
  }
}

async function performLogin() {
  const email = document.getElementById('login-email').value;
  const password = document.getElementById('login-pass').value;
  try {
    const data = await apiRequest('/auth/login', 'POST', { email, password });
    if(data.error) return alert(data.error);
    TOKEN = data.token;
    USER = data.user;
    localStorage.setItem('vpt_token', TOKEN);
    
    // Updates profile status token display label
    document.getElementById('user-display').innerHTML = `
      ${USER.full_name} <span class="role-chip chip-${USER.role}">${USER.role.replace('_', ' ')}</span>
    `;
    
    await loadFleetView();
    showPage('fleet');
  } catch(e) { alert('Authentication failed: Invalid credentials or connectivity issue'); }
}

function performLogout() {
  TOKEN = ''; USER = null;
  localStorage.removeItem('vpt_token');
  showPage('login');
}

async function loadFleetView() {
  const container = document.getElementById('fleet-list');
  container.innerHTML = '<p style="color:var(--steel); padding: 1rem;">Syncing active vessel telemetry arrays...</p>';

  try {
    const data = await apiRequest('/vessels');
    FLEET = data.vessels || data || [];
    
    if(!FLEET.length) {
      container.innerHTML = '<div class="card text-center text-muted">No assigned vessel profiles found in current fleet register.</div>';
      return;
    }
    
    // Standardizes clean grid design architecture across all devices
    container.innerHTML = `
      <div class="vessel-grid">
        ${FLEET.map(v => {
          const typeLabel = v.vessel_type || 'Crewboat';
          return `
            <div class="vessel-card-trip trip-status-active" onclick="loadVesselDetail('${v.id}')">
              <div class="vessel-icon" style="margin: 0 auto 0.75rem auto;">
                <i class="ti ti-ship"></i>
              </div>
              <div class="vname" style="font-size: 15px; font-weight: 700; color: var(--gold); margin-bottom: 4px;">${v.name}</div>
              <div style="font-size: 11px; color: var(--steel); text-transform: uppercase; letter-spacing: 0.5px;">${typeLabel}</div>
              <div class="pct-bar-bg" style="margin-top: 10px;">
                <div class="pct-bar-fill" style="width: 100%;"></div>
              </div>
              <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 8px; font-size: 11px;">
                <span class="stat-pill pill-ok">Online</span>
                <span style="color: var(--steel);"><i class="ti ti-chevron-right"></i></span>
              </div>
            </div>
          `;
        }).join('')}
      </div>
    `;
  } catch(e) {
    console.error('Fleet view compilation failure:', e);
    container.innerHTML = `<div class="card text-center text-danger">Failed to bind to server data registry: ${e.message}</div>`;
  }
}

async function loadVesselDetail(id) {
  ACTIVE_VESSEL = FLEET.find(v => v.id === id);
  if (!ACTIVE_VESSEL) return;
  document.getElementById('vessel-title').innerText = ACTIVE_VESSEL.name;
  showPage('vessel');
  
  const historyZone = document.getElementById('vessel-logs-history');
  const data = await apiRequest(`/logs?vessel_id=${id}`);
  const logsList = data.logs || [];
  
  if(!logsList.length) {
    historyZone.innerHTML = '<div class="empty-state">No historical log sheets recorded for this vessel asset yet.</div>';
    return;
  }
  
  historyZone.innerHTML = logsList.map(l => `
    <div class="log-row" style="border-left-color:var(--green)">
      <div style="display:flex;justify-content:space-between;">
        <strong>Sheet #${l.log_number}</strong>
        <span class="stat-pill pill-ok">${l.completion_pct}% Done</span>
      </div>
      <div style="font-size:12px;color:var(--steel);margin-top:4px;">
        <span><i class="ti ti-calendar"></i> ${new Date(l.log_date).toLocaleDateString()}</span> | 
        <span><i class="ti ti-user"></i> ${l.engineer_name || 'Crew Operator'}</span>
      </div>
    </div>
  `).join('');
}

function initiateNewLogForm() {
  accumulatedWatchesPayload = [];
  document.getElementById('watches-badge-tray').innerHTML = '<span style="color:var(--steel);font-size:12px;">No shift rotations attached.</span>';
  document.getElementById('form-log-num').value = `VPT-${Math.floor(100000 + Math.random() * 900000)}`;
  document.getElementById('form-date').value = new Date().toISOString().split('T')[0];
  document.getElementById('form-hours').value = '';
  document.getElementById('form-fuel').value = '';
  document.getElementById('form-crew').value = '';
  document.getElementById('form-notes').value = '';
  
  structuredChecklistState = DEFAULT_ITEMS.map(i => ({
    item_key: i.key,
    label: i.label,
    checked: true,
    flag: 'ok'
  }));
  refreshChecklistUIRender();
  showPage('form');
}

function refreshChecklistUIRender() {
  const container = document.getElementById('checklist-render-zone');
  container.innerHTML = structuredChecklistState.map((item, index) => `
    <div class="card" style="margin-bottom:0.5rem;padding:0.75rem;">
      <div style="font-size:13px;font-weight:600;margin-bottom:0.5rem;">${item.label}</div>
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <label style="display:flex;align-items:center;gap:0.5rem;font-size:13px;cursor:pointer;">
          <input type="checkbox" style="width:18px;height:18px;" ${item.checked ? 'checked' : ''} onchange="structuredChecklistState[index].checked = this.checked">
          Mark Inspected
        </label>
        <div class="check-actions">
          <button type="button" class="action-btn ${item.flag === 'ok' ? 'active-ok' : ''}" onclick="structuredChecklistState[index].flag='ok';refreshChecklistUIRender()"><i class="ti ti-check"></i></button>
          <button type="button" class="action-btn ${item.flag === 'flag' ? 'active-flag' : ''}" onclick="structuredChecklistState[index].flag='flag';refreshChecklistUIRender()"><i class="ti ti-alert-triangle"></i></button>
        </div>
      </div>
    </div>
  `).join('');
}

function addNewWatchToArray() {
  const period = document.getElementById('watch-period-input').value.trim();
  const eng = document.getElementById('watch-eng-input').value.trim();
  const start = document.getElementById('watch-start-hours').value;
  const end = document.getElementById('watch-end-hours').value;
  
  if (!period || !eng) return alert('Watch Period and Engineer Name are required');
  
  accumulatedWatchesPayload.push({
    watch_period: period,
    engineer_name: eng,
    engine_hours_start: start ? parseFloat(start) : null,
    engine_hours_end: end ? parseFloat(end) : null
  });
  
  const tray = document.getElementById('watches-badge-tray');
  if(accumulatedWatchesPayload.length === 1) tray.innerHTML = '';
  tray.innerHTML += `<span class="stat-pill pill-ok" style="padding:6px;margin:2px;">${period}: ${eng}</span>`;
  
  document.getElementById('watch-period-input').value = '';
  document.getElementById('watch-eng-input').value = '';
  document.getElementById('watch-start-hours').value = '';
  document.getElementById('watch-end-hours').value = '';
}

async function dispatchLogPayloadToServer() {
  const payload = {
    vessel_id: ACTIVE_VESSEL.id,
    log_number: document.getElementById('form-log-num').value,
    log_date: document.getElementById('form-date').value,
    engineer_name: document.getElementById('form-engineer').value,
    engine_hours: parseFloat(document.getElementById('form-hours').value) || null,
    fuel_level: document.getElementById('form-fuel').value,
    crew_names: document.getElementById('form-crew').value.split(',').map(n => n.trim()).filter(Boolean),
    notes: document.getElementById('form-notes').value,
    check_items: structuredChecklistState,
    watches: accumulatedWatchesPayload,
    readings: []
  };
  
  const res = await apiRequest('/logs', 'POST', payload);
  if(res.error) return alert(res.error);
  alert('Log sheet successfully recorded.');
  await loadVesselDetail(ACTIVE_VESSEL.id);
  showPage('vessel');
}

window.addEventListener('DOMContentLoaded', () => {
  if (TOKEN) {
    apiRequest('/auth/me').then(data => {
      if(data.error) return performLogout();
      USER = data.user || data;
      document.getElementById('user-display').innerHTML = `
        ${USER.full_name} <span class="role-chip chip-${USER.role}">${USER.role.replace('_', ' ')}</span>
      `;
      loadFleetView();
      showPage('fleet');
    }).catch(() => performLogout());
  } else {
    showPage('login');
  }
});
</script>
</body>
</html>
